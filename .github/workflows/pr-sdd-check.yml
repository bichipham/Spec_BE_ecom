name: Manual SDD Review

on:
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Spec path"
        required: true
        type: string
      base_ref:
        description: "Base branch"
        required: false
        default: "main"
        type: string

jobs:
  manual-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: git fetch origin "${{ inputs.base_ref }}"
      - run: git diff "origin/${{ inputs.base_ref }}"...HEAD > pr.diff

      - env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ai_review.py "${{ inputs.spec_file }}" pr.diff > ai_review.md

      - uses: actions/upload-artifact@v4
        with:
          name: ai-review
          path: ai_review.md