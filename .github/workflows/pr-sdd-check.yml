name: PR SDD Checks

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  spec-check:
    name: Check spec presence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate spec exists
        run: |
          test -f specs/spec_A.md || (echo "Missing specs/spec_A.md" && exit 1)

  validate:
    name: Lint, build, and tests
    runs-on: ubuntu-latest
    needs: spec-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Contract tests
        run: npm run test:contract

  ai-review:
    name: AI preliminary review
    runs-on: ubuntu-latest
    needs: spec-check
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Capture PR diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > pr.diff

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python scripts/ai_review.py specs/spec_A.md pr.diff > ai_review.md

      - name: Upload AI review artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-review
          path: ai_review.md

      - name: Comment AI review on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file ai_review.md