openapi: 3.0.3
info:
  title: Ecom Backend API
  version: 1.0.0
  description: Contract for 6-phase e-commerce backend roadmap
servers:
  - url: /api/v1
paths:
  /health:
    get:
      summary: Liveness check
      responses:
        '200':
          description: OK
  /ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Ready

  /users:
    get:
      summary: List users
      responses:
        '200':
          description: User list
    post:
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created

  /users/{id}:
    get:
      summary: Get user by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: User found }
        '404': { description: Not found }
    put:
      summary: Update user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200': { description: Updated }
    delete:
      summary: Delete user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }

  /products:
    get:
      summary: List products
      responses:
        '200': { description: Product list }
    post:
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201': { description: Product created }

  /products/{id}:
    get:
      summary: Get product by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Product found }
        '404': { description: Not found }
    put:
      summary: Update product
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200': { description: Updated }
    delete:
      summary: Delete product
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }

  /orders:
    get:
      summary: List orders
      responses:
        '200': { description: Order list }
    post:
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201': { description: Order created }

  /orders/{id}:
    get:
      summary: Get order by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Order found }
        '404': { description: Not found }
    put:
      summary: Update order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdateRequest'
      responses:
        '200': { description: Updated }
    delete:
      summary: Delete order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }

  /order-items:
    get:
      summary: List order items
      responses:
        '200': { description: OrderItem list }
    post:
      summary: Create order item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderItemCreateRequest'
      responses:
        '201': { description: Order item created }

  /order-items/{id}:
    get:
      summary: Get order item by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Order item found }
        '404': { description: Not found }
    put:
      summary: Update order item
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderItemUpdateRequest'
      responses:
        '200': { description: Updated }
    delete:
      summary: Delete order item
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }

  /auth/login:
    post:
      summary: Login and get access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200': { description: Login success }
        '401': { description: Unauthorized }

  /search:
    get:
      summary: Basic search
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
      responses:
        '200': { description: Search results }

  /search/advanced:
    get:
      summary: Advanced search
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: size
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: sort
          schema: { type: string }
      responses:
        '200': { description: Advanced search results }

components:
  schemas:
    UserCreateRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role: { type: string, enum: [ADMIN, OPERATOR] }
    UserUpdateRequest:
      type: object
      properties:
        name: { type: string }
        role: { type: string, enum: [ADMIN, OPERATOR] }

    ProductCreateRequest:
      type: object
      required: [name, price, stock]
      properties:
        name: { type: string }
        price: { type: number, format: double, minimum: 0 }
        stock: { type: integer, minimum: 0 }
    ProductUpdateRequest:
      type: object
      properties:
        name: { type: string }
        price: { type: number, format: double, minimum: 0 }
        stock: { type: integer, minimum: 0 }

    OrderCreateRequest:
      type: object
      required: [user_id, status]
      properties:
        user_id: { type: string }
        status: { type: string, enum: [PENDING, PAID, SHIPPED, CANCELLED] }
    OrderUpdateRequest:
      type: object
      properties:
        status: { type: string, enum: [PENDING, PAID, SHIPPED, CANCELLED] }

    OrderItemCreateRequest:
      type: object
      required: [order_id, product_id, quantity, price]
      properties:
        order_id: { type: string }
        product_id: { type: string }
        quantity: { type: integer, minimum: 1 }
        price: { type: number, format: double, minimum: 0 }
    OrderItemUpdateRequest:
      type: object
      properties:
        quantity: { type: integer, minimum: 1 }
        price: { type: number, format: double, minimum: 0 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
