spring:
  application:
    name: spec-be-ecom
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    property-naming-strategy: SNAKE_CASE

server:
  port: 8080
  servlet:
    context-path: /

api:
  base-path: /api/v1

storage:
  type: json
  json:
    data-dir: backend/src/main/resources/data

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId}] %logger{36} - %msg%n"
