spring:
  application:
    name: spec-be-ecom
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    property-naming-strategy: SNAKE_CASE
  # ── Email (Gmail SMTP) ───────────────────────────────────────────────────────
  # Override via env vars: MAIL_USERNAME, MAIL_PASSWORD (Gmail App Password)
  mail:
    host: smtp.gmail.com
    port: 587
    username: "${MAIL_USERNAME:your-email@gmail.com}"
    password: "${MAIL_PASSWORD:your-app-password}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com

server:
  port: 8081
  servlet:
    context-path: /

api:
  base-path: /api/v1

storage:
  type: json
  json:
    data-dir: backend/src/main/resources/data

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId}] %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  default-produces-media-type: application/json

app:
  jwt:
    # Override with a strong random secret in production via APP_JWT_SECRET env var.
    # Must be at least 256 bits (32 UTF-8 characters) for HS256.
    secret: "${APP_JWT_SECRET:LocalDevSecretChangeInProd!!__256bits__}"
    expiration-ms: 3600000  # 1 hour

# ── Twilio (SMS) ───────────────────────────────────────────────────────────────
# Set via env vars: TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM_NUMBER
twilio:
  account-sid: "${TWILIO_ACCOUNT_SID:ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}"
  auth-token: "${TWILIO_AUTH_TOKEN:your-auth-token}"
  from-number: "${TWILIO_FROM_NUMBER:+1234567890}"
